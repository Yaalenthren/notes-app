upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# HTTP server - currently active
# NOTE: SSL/HTTPS config is commented out below because we are using
# an EC2 public IP address. To enable SSL, you need a domain name
# pointed to this server, then run certbot to get Let's Encrypt
# certificates and uncomment the HTTPS server block below.
server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /django-static/ {
        proxy_pass http://backend/static/;
    }

    location /media/ {
        proxy_pass http://backend;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

